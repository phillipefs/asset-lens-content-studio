name: Validate Content Studio

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install validation dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Validate structure and agent wiring
        run: python scripts/validate_studio.py

      - name: Compile Python scripts
        run: >-
          python -m py_compile
          .agents/skills/asset-lens-post-studio/scripts/build_html.py
          .agents/skills/asset-lens-post-studio/scripts/run.py
          .agents/skills/asset-lens-post-studio/scripts/verify_output.py
          scripts/validate_studio.py
          scripts/smoke_test.py

      - name: Run end-to-end smoke renders
        run: python scripts/smoke_test.py

      - name: Upload smoke images
        uses: actions/upload-artifact@v4
        with:
          name: smoke-images
          path: .tmp/smoke/*/post.png
          if-no-files-found: error